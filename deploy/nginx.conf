# /etc/nginx/sites-available/initiales
# À adapter selon ton domaine et tes chemins.

server {
    listen 80;
    listen [::]:80;
    server_name initiales.example.com;

    # Redirect HTTP → HTTPS (une fois Certbot lancé, il ajoutera ceci automatiquement)
    # return 301 https://$host$request_uri;

    # Ou pour du HTTP direct en attendant :
    root /var/www/initiales/frontend;
    index index.html;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    # Cache assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback : toute route inconnue renvoie index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy vers le backend FastAPI
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Sécurité basique
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
}

# Puis :
# sudo ln -s /etc/nginx/sites-available/initiales /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx
# Pour HTTPS : sudo certbot --nginx -d initiales.example.com
